<!DOCTYPE html>
<html>

<head>
    <link rel="Stylesheet" href="Style.css">
    <title>Autopay Reminder</title>
</head>

<hr>

<body>
<div class="container">
    <h1>Autopay Reminder!</h1>

    <form id="reminderForm">

        <label for="uid">User Id</label>
        <input type="number" id="uid" required><br><br>

        <label for="ser">Add Service</label>
        <input type="text" id="ser" required><br><br>

        <label for="dd">Due Date</label>
        <input type="datetime-local" id="dd" required><br><br>

        <label for="amt">Amount</label>
        <input type="number" id="amt" required><br><br>

        <button type="submit">Set Reminder</button>

    </form>

    <br>

    <h2>Countdown</h2>

    <h3 id="timer">No Reminder Yet</h3>

    <script src="script.js"></script>

</div>

</body>


</html>
